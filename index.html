<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>


<header>
  <div class="logo-mark">Scrappy's Exotic Yard</div>
  <img src="ScrappyLogoSmall.png" alt="Scrappy's Exotic Yard" style="width:95px;height:63px;object-fit:contain;align-self:center;">
  <div class="header-main">
    <h1>Linage <span>Tool</span></h1>
    <div class="header-sub">Bearded Dragon Breeding — Phenotype & Probability Engine</div>
  </div>
  <div class="header-badge">v1.0 · Beta</div>
</header>

<div class="app-container">

  <div class="parents-grid">
    <!-- SIRE -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Sire</div>
        <div class="sex-badge male">♂</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Sire Name</label>
            <input type="text" id="sire-name" placeholder="e.g. Skippy">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="sire-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="sire-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">GENES</div>
        <div class="gene-list" id="sire-genes"></div>
        <button class="btn-add" onclick="addGene('sire')">+ Add Gene</button>
      </div>
    </div>

    <!-- DAM -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Dam</div>
        <div class="sex-badge female">♀</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Dam Name</label>
            <input type="text" id="dam-name" placeholder="e.g. Comet">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="dam-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="dam-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">GENES</div>
        <div class="gene-list" id="dam-genes"></div>
        <button class="btn-add" onclick="addGene('dam')">+ Add Gene</button>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-bottom: 32px;">
    <button class="btn-primary" onclick="calculate()">Calculate Cross</button>
    <button class="btn-secondary" onclick="resetForm()">Reset Form</button>
  </div>

  <!-- RESULTS -->
  <div id="results-section" class="results-section">
    <div class="results-header">
      <h2>Results</h2>
      <div id="results-meta" class="results-meta"></div>
    </div>

    <div id="warnings-container" style="margin-bottom: 16px;"></div>
    <div id="info-container" style="margin-bottom: 16px;"></div>

    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th>Phenotype</th>
            <th>Genotype</th>
            <th>Probability</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
