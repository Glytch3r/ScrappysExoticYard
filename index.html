<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo-mark">Breeding</div>
  <div class="header-main">
    <h1>Lineage <span>Tool</span></h1>
    <div class="header-sub">Bearded Dragon Breeding — Phenotype & Probability Engine</div>
  </div>
  <div class="header-badge">v1.0 · Beta</div>
</header>

<div class="app-container">

  <div class="parents-grid">
    <!-- SIRE -->
    <div class="panel" id="sire-panel">
      <div class="panel-header">
        <div class="sex-badge male">♂</div>
        <div class="panel-title">Sire</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Sire Name</label>
            <input type="text" id="sire-name" placeholder="e.g. Skippy">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="sire-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="sire-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">Genetic Profile</div>
        <div class="gene-list" id="sire-genes"></div>
        <div class="empty-genes" id="sire-empty">No genes added yet.</div>
        <button class="btn-add-gene" onclick="addGene('sire')">+ Add Gene</button>
        <div class="auto-notice" id="sire-auto-notice"></div>
      </div>
    </div>

    <!-- DAM -->
    <div class="panel" id="dam-panel">
      <div class="panel-header">
        <div class="sex-badge female">♀</div>
        <div class="panel-title">Dam</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Dam Name</label>
            <input type="text" id="dam-name" placeholder="e.g. Comet">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="dam-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="dam-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">Genetic Profile</div>
        <div class="gene-list" id="dam-genes"></div>
        <div class="empty-genes" id="dam-empty">No genes added yet.</div>
        <button class="btn-add-gene" onclick="addGene('dam')">+ Add Gene</button>
        <div class="auto-notice" id="dam-auto-notice"></div>
      </div>
    </div>
  </div>

  <div class="calculate-section">
    <button class="btn-calculate" onclick="calculate()">Calculate Clutch Genetics</button>
  </div>

  <div id="results-section">
    <div class="results-header">
      <div class="results-title">Clutch Results</div>
      <div class="results-meta" id="results-meta"></div>
    </div>
    <div id="warnings-container"></div>
    <div id="info-container"></div>
    <div class="results-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Phenotype</th>
            <th>Genotype</th>
            <th class="prob-bar-cell">Probability</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
