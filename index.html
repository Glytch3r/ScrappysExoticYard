<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="logo-mark">BREED</div>
  <div class="header-main">
    <h1>Breeding <span>Tool</span></h1>
    <div class="header-sub">genetic calculator for ball pythons</div>
  </div>
  <div class="header-badge">v2.0</div>
</header>

<div class="app-container">
  <div class="parents-grid">
    <!-- SIRE PANEL -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Sire</div>
        <div class="sex-badge male">♂</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Name</label>
            <input type="text" id="sire-name" placeholder="Sire name">
          </div>
          <div class="field-group">
            <label>Morph / ID</label>
            <input type="text" id="sire-morph" placeholder="e.g. Pastel">
          </div>
          <div class="field-group">
            <label>Notes</label>
            <input type="text" id="sire-notes" placeholder="Optional notes">
          </div>
        </div>
        <div class="section-label">GENES</div>
        <div class="gene-list" id="sire-genes"></div>
        <button class="btn-add" id="sire-add-gene">+ Add Gene</button>
      </div>
    </div>

    <!-- DAM PANEL -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Dam</div>
        <div class="sex-badge female">♀</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Name</label>
            <input type="text" id="dam-name" placeholder="Dam name">
          </div>
          <div class="field-group">
            <label>Morph / ID</label>
            <input type="text" id="dam-morph" placeholder="e.g. Pastel">
          </div>
          <div class="field-group">
            <label>Notes</label>
            <input type="text" id="dam-notes" placeholder="Optional notes">
          </div>
        </div>
        <div class="section-label">GENES</div>
        <div class="gene-list" id="dam-genes"></div>
        <button class="btn-add" id="dam-add-gene">+ Add Gene</button>
      </div>
    </div>
  </div>

  <div style="display: flex; gap: 12px; margin-bottom: 32px;">
    <button class="btn-primary" id="calculate-btn">Calculate Cross</button>
    <button class="btn-secondary" id="reset-btn">Reset Form</button>
  </div>

  <!-- RESULTS -->
  <div id="results-section" class="results-section">
    <div class="results-header">
      <h2>Results</h2>
      <div id="results-meta" class="results-meta"></div>
    </div>

    <div id="warnings-container" style="margin-bottom: 16px;"></div>
    <div id="info-container" style="margin-bottom: 16px;"></div>

    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th>Phenotype</th>
            <th>Genotype</th>
            <th>Probability</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
