<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --surface2: #242018;
    --border: #2e2a22;
    --accent: #d4a843;
    --accent2: #c47c2a;
    --accent-glow: rgba(212,168,67,0.15);
    --text: #e8e0d0;
    --text-dim: #8a7f6e;
    --text-muted: #4a4438;
    --red: #c45c3a;
    --green: #6a9e5c;
    --tag-bg: #1e1c16;
    --radius: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.08) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a843' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    position: relative;
  }
  .logo-mark {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    line-height: 1;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    opacity: 0.7;
  }
  .header-main h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .header-main h1 span { color: var(--accent); }
  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .header-badge {
    margin-left: auto;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* LAYOUT */
  .app-container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  .parents-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* PANELS */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .sex-badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .sex-badge.male { background: rgba(100,150,220,0.15); color: #7aabee; border: 1px solid rgba(100,150,220,0.3); }
  .sex-badge.female { background: rgba(220,100,130,0.15); color: #ee7aaa; border: 1px solid rgba(220,100,130,0.3); }

  .panel-body { padding: 18px; }

  /* PEDIGREE */
  .pedigree-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .field-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .field-group input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input[type="text"]:focus { border-color: var(--accent2); }
  .field-group input[type="text"]::placeholder { color: var(--text-muted); }

  /* SECTION DIVIDER */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* GENE LIST */
  .gene-list { display: flex; flex-direction: column; gap: 8px; }

  .gene-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 140px 1fr auto auto;
    gap: 10px;
    align-items: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .gene-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 4px;
    outline: none;
    width: 100%;
  }
  .gene-row select:focus { border-color: var(--accent2); }

  .state-radios {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .state-radios label {
    cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    transition: all 0.15s;
    user-select: none;
    white-space: nowrap;
  }
  .state-radios input[type="radio"] { display: none; }
  .state-radios input[type="radio"]:checked + label {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  .proven-check {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    user-select: none;
  }
  .proven-check input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; }

  .btn-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--red); }

  /* BUTTONS */
  .btn-add-gene {
    margin-top: 10px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: all 0.15s;
  }
  .btn-add-gene:hover { border-color: var(--accent2); color: var(--accent); }

  /* AUTO-POPULATED HINT */
  .auto-hint {
    font-size: 10px;
    color: var(--accent2);
    margin-top: 4px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .auto-hint.visible { display: block; }

  /* CALCULATE BUTTON */
  .calculate-section {
    text-align: center;
    margin: 8px 0 32px;
  }
  .btn-calculate {
    background: var(--accent);
    color: var(--bg);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    padding: 16px 60px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-calculate::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .btn-calculate:hover { background: #e8bb55; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(212,168,67,0.3); }
  .btn-calculate:active { transform: translateY(0); }

  /* RESULTS */
  #results-section { display: none; }
  #results-section.visible { display: block; animation: fadeIn 0.3s ease; }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }
  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .results-meta {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* RESULTS TABLE */
  .results-table-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--surface2);
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 12px 16px; vertical-align: middle; }

  .prob-bar-cell { width: 200px; }
  .prob-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .prob-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .prob-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .prob-pct {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    min-width: 42px;
    text-align: right;
  }

  .phenotype-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 3px;
  }
  .genotype-code {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.06em;
    margin: 2px;
    white-space: nowrap;
  }
  .tag-visual { background: rgba(212,168,67,0.15); color: var(--accent); border: 1px solid rgba(212,168,67,0.25); }
  .tag-het { background: rgba(100,158,92,0.12); color: #7fbe71; border: 1px solid rgba(100,158,92,0.25); }
  .tag-poss { background: rgba(100,130,200,0.12); color: #7a9ee0; border: 1px solid rgba(100,130,200,0.25); }
  .tag-normal { background: rgba(100,100,100,0.12); color: var(--text-dim); border: 1px solid var(--border); }
  .tag-super { background: rgba(196,92,58,0.15); color: #e8866a; border: 1px solid rgba(196,92,58,0.3); }

  /* WARNING BOX */
  .warning-box {
    background: rgba(196,92,58,0.1);
    border: 1px solid rgba(196,92,58,0.3);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 11px;
    color: #e8866a;
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .warning-icon { flex-shrink: 0; }

  /* INFO BOX */
  .info-box {
    background: var(--accent-glow);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* EMPTY STATE */
  .empty-genes {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 16px;
  }

  /* AUTO-POPULATE SECTION */
  .auto-notice {
    background: rgba(106,158,92,0.08);
    border: 1px solid rgba(106,158,92,0.2);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 10px;
    color: #7fbe71;
    letter-spacing: 0.05em;
    margin-top: 8px;
    display: none;
  }
  .auto-notice.visible { display: block; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .parents-grid { grid-template-columns: 1fr; }
    header { padding: 20px; }
    .app-container { padding: 20px; }
    .gene-row { grid-template-columns: 1fr; }
    .pedigree-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">Scrappy's Exotic Yard</div>
  <img src="ScrappyLogoSmall.png" alt="Scrappy's Exotic Yard" style="width:95px;height:63px;object-fit:contain;align-self:center;">
  <div class="header-main">
    <h1>Linage <span>Tool</span></h1>
    <div class="header-sub">Bearded Dragon Breeding — Phenotype & Probability Engine</div>
  </div>
  <div class="header-badge">v1.0 · Beta</div>
</header>

<div class="app-container">

  <div class="parents-grid">
    <!-- SIRE -->
    <div class="panel" id="sire-panel">
      <div class="panel-header">
        <div class="sex-badge male">♂</div>
        <div class="panel-title">Sire</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Sire Name</label>
            <input type="text" id="sire-name" placeholder="e.g. Skippy">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="sire-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="sire-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">Genetic Profile</div>
        <div class="gene-list" id="sire-genes"></div>
        <div class="empty-genes" id="sire-empty">No genes added yet.</div>
        <button class="btn-add-gene" onclick="addGene('sire')">+ Add Gene</button>
        <div class="auto-notice" id="sire-auto-notice"></div>
      </div>
    </div>

    <!-- DAM -->
    <div class="panel" id="dam-panel">
      <div class="panel-header">
        <div class="sex-badge female">♀</div>
        <div class="panel-title">Dam</div>
      </div>
      <div class="panel-body">
        <div class="pedigree-row">
          <div class="field-group">
            <label>Dam Name</label>
            <input type="text" id="dam-name" placeholder="e.g. Comet">
          </div>
          <div class="field-group">
            <label>Father</label>
            <input type="text" id="dam-gf" placeholder="Father's name">
          </div>
          <div class="field-group">
            <label>Mother</label>
            <input type="text" id="dam-gm" placeholder="Mother's name">
          </div>
        </div>
        <div class="section-label">Genetic Profile</div>
        <div class="gene-list" id="dam-genes"></div>
        <div class="empty-genes" id="dam-empty">No genes added yet.</div>
        <button class="btn-add-gene" onclick="addGene('dam')">+ Add Gene</button>
        <div class="auto-notice" id="dam-auto-notice"></div>
      </div>
    </div>
  </div>

  <div class="calculate-section">
    <button class="btn-calculate" onclick="calculate()">Calculate Clutch Genetics</button>
  </div>

  <div id="results-section">
    <div class="results-header">
      <div class="results-title">Clutch Results</div>
      <div class="results-meta" id="results-meta"></div>
    </div>
    <div id="warnings-container"></div>
    <div id="info-container"></div>
    <div class="results-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Phenotype</th>
            <th>Genotype</th>
            <th class="prob-bar-cell">Probability</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ─── MASTER GENE DATA ────────────────────────────────────────────────────────
const GENES = {
  Hypomelanistic: {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Hypo'
  },
  Translucent: {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Trans'
  },
  Witblits: {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Witblits'
  },
  Zero: {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Zero'
  },
  'Genetic Stripe': {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Stripe'
  },
  Leatherback: {
    category: 'incdominant',
    states: ['Normal','Visual (Leatherback)','Super (Silkback)'],
    short: 'LB'
  },
  Dunner: {
    category: 'dominant',
    states: ['Visual','Normal'],
    short: 'Dunner'
  },
  'German Giant': {
    category: 'lineage',
    states: ['Visual','Normal'],
    short: 'GG'
  },
  'Red Expression': {
    category: 'nonmendelian',
    states: ['None', 'Low (Pastel)', 'High (Deep Red)'],
    short: 'Red'
  },
  'Citrus Expression': {
    category: 'nonmendelian',
    states: ['None', 'Low (Yellow)', 'High (Neon Citrus)'],
    short: 'Citrus'
  },
  'Blue/Silver Bar': {
    category: 'nonmendelian',
    states: ['None', 'Visual'],
    short: 'Blue'
  },
  Axanthic: {
    category: 'recessive',
    states: ['Visual','Het','66% Poss Het','50% Poss Het','Normal','Unknown'],
    short: 'Axanthic'
  },
};

// UI LOGIC FOR COLOR CALCULATION
function calculateColor(sireColor, damColor) {
  // Logic: High x Low = Mid; High x High = High; Low x None = Low/Poss Low
  if (sireColor === 'High' && damColor === 'High') return 'Expected High Expression';
  if (sireColor === 'None' && damColor === 'None') return 'No Expression';
  return 'Variable Expression Expected';
}

// REDUNDANCY RULE (Logic Gate)
// If Red = High AND Citrus = High, the app UI should tag the result as "Flame/Orange"
// ─── STATE ────────────────────────────────────────────────────────────────────
let geneCounters = { sire: 0, dam: 0 };
const parentGenes = { sire: {}, dam: {} };

// ─── ADD GENE ROW ─────────────────────────────────────────────────────────────
function getUsedGenes(parent) {
  return Object.values(parentGenes[parent]).map(g => g.gene);
}

function addGene(parent, prefillGene, prefillState) {
  const list = document.getElementById(`${parent}-genes`);
  const empty = document.getElementById(`${parent}-empty`);

  // Find first unused gene
  const used = getUsedGenes(parent);
  const available = Object.keys(GENES).filter(g => !used.includes(g));
  if (available.length === 0) return; // all genes already added

  const geneToAdd = prefillGene && available.includes(prefillGene) ? prefillGene : available[0];

  const id = ++geneCounters[parent];
  const rowId = `${parent}-gene-${id}`;

  const row = document.createElement('div');
  row.className = 'gene-row';
  row.id = rowId;

  // Gene select — only show unused genes (plus current one)
  const sel = document.createElement('select');
  refreshGeneSelect(sel, parent, geneToAdd);
  sel.onchange = () => {
    // Check if newly selected gene is already used by another row
    const usedNow = getUsedGenes(parent);
    const oldGene = parentGenes[parent][id]?.gene;
    const newGene = sel.value;
    if (usedNow.includes(newGene) && newGene !== oldGene) {
      sel.value = oldGene; // revert
      return;
    }
    renderStates(row, sel.value, parent, id);
    refreshAllGeneSelects(parent);
    checkWeroLogic(parent);
  };
  row.appendChild(sel);

  // States + percent container (flex column)
  const stateCol = document.createElement('div');
  stateCol.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

  const stateWrap = document.createElement('div');
  stateWrap.className = 'state-radios';
  stateWrap.id = `${rowId}-states`;
  stateCol.appendChild(stateWrap);

  // Percent input row (only for recessive poss het)
  const pctRow = document.createElement('div');
  pctRow.id = `${rowId}-pctrow`;
  pctRow.style.cssText = 'display:none;align-items:center;gap:6px;';
  const pctInput = document.createElement('input');
  pctInput.type = 'number';
  pctInput.id = `${rowId}-pct`;
  pctInput.min = 0; pctInput.max = 100; pctInput.step = 1;
  pctInput.style.cssText = 'width:64px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 7px;color:var(--accent);font-family:"DM Mono",monospace;font-size:12px;outline:none;';
  const pctLabel = document.createElement('span');
  pctLabel.textContent = '% poss het';
  pctLabel.style.cssText = 'font-size:10px;color:var(--text-dim);';
  pctRow.appendChild(pctInput);
  pctRow.appendChild(pctLabel);
  stateCol.appendChild(pctRow);

  // Sync: percent input → radio buttons
  pctInput.addEventListener('input', () => {
    const val = parseFloat(pctInput.value);
    syncRadioFromPct(rowId, parent, id, val, sel.value);
  });

  row.appendChild(stateCol);

  // Proven checkbox
  const provenLabel = document.createElement('label');
  provenLabel.className = 'proven-check';
  const provenCb = document.createElement('input');
  provenCb.type = 'checkbox';
  provenCb.id = `${rowId}-proven`;
  provenLabel.appendChild(provenCb);
  provenLabel.appendChild(document.createTextNode('Proven'));
  row.appendChild(provenLabel);

  // Remove
  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn-remove';
  removeBtn.textContent = '×';
  removeBtn.onclick = () => {
    delete parentGenes[parent][id];
    row.remove();
    if (!list.children.length) empty.style.display = 'block';
    refreshAllGeneSelects(parent);
    checkWeroLogic(parent);
  };
  row.appendChild(removeBtn);

  list.appendChild(row);
  empty.style.display = 'none';

  renderStates(row, geneToAdd, parent, id, prefillState);
  parentGenes[parent][id] = { gene: geneToAdd, state: prefillState || getDefaultState(geneToAdd) };
  refreshAllGeneSelects(parent);
  checkWeroLogic(parent);
}

function refreshGeneSelect(sel, parent, currentGene) {
  const used = getUsedGenes(parent);
  sel.innerHTML = Object.keys(GENES).map(g => {
    const disabled = used.includes(g) && g !== currentGene;
    return `<option value="${g}" ${g === currentGene ? 'selected' : ''} ${disabled ? 'disabled style="color:#4a4438"' : ''}>${g}${disabled ? ' ✓' : ''}</option>`;
  }).join('');
}

function refreshAllGeneSelects(parent) {
  const list = document.getElementById(`${parent}-genes`);
  if (!list) return;
  list.querySelectorAll('select').forEach(sel => {
    const rowId = sel.closest('.gene-row')?.id;
    if (!rowId) return;
    const parts = rowId.split('-gene-');
    const id = parseInt(parts[1]);
    const currentGene = parentGenes[parent][id]?.gene;
    if (currentGene) refreshGeneSelect(sel, parent, currentGene);
  });
}

function getDefaultState(geneName) {
  return GENES[geneName].states[0];
}

// Map a percentage to the closest named state and update radios
function syncRadioFromPct(rowId, parent, id, val, geneName) {
  if (isNaN(val)) return;
  val = Math.max(0, Math.min(100, val));

  let newState;
  if (val === 100) {
    // 100% = confirmed Het (or Visual if you already have het)
    newState = 'Het';
  } else if (val >= 80) {
    newState = '66% Poss Het';
  } else if (val >= 25) {
    newState = '50% Poss Het';
  } else if (val === 0) {
    newState = 'Normal';
  } else {
    newState = '50% Poss Het';
  }

  // Highlight the matching radio
  const wrap = document.getElementById(`${rowId}-states`);
  if (!wrap) return;
  wrap.querySelectorAll('input[type="radio"]').forEach(r => {
    if (r.value === newState) {
      r.checked = true;
      parentGenes[parent][id] = { gene: geneName, state: newState };
    }
  });

  // Visual feedback on input border
  const pctInput = document.getElementById(`${rowId}-pct`);
  if (pctInput) {
    pctInput.style.borderColor = val === 100 ? 'var(--accent)' : 'var(--border)';
  }
}

// Sync: radio → percent input
function syncPctFromRadio(rowId, state) {
  const pctInput = document.getElementById(`${rowId}-pct`);
  if (!pctInput) return;
  const map = { 'Visual': '', 'Het': '100', '66% Poss Het': '66', '50% Poss Het': '50', 'Normal': '0', 'Unknown': '' };
  pctInput.value = map[state] ?? '';
}

function renderStates(row, geneName, parent, id, prefillState) {
  const rowId = `${parent}-gene-${id}`;
  const wrap = document.getElementById(`${rowId}-states`);
  if (!wrap) return;
  wrap.innerHTML = '';
  const gene = GENES[geneName];
  const states = gene.states;
  const defaultState = prefillState || states[0];

  const isPossHetGene = gene.category === 'recessive';
  const pctRow = document.getElementById(`${rowId}-pctrow`);

  states.forEach((s, i) => {
    const rid = `${rowId}-s${i}`;
    const inp = document.createElement('input');
    inp.type = 'radio';
    inp.name = `${rowId}-state`;
    inp.value = s;
    inp.id = rid;
    inp.checked = s === defaultState;
    inp.onchange = () => {
      parentGenes[parent][id] = { gene: geneName, state: s };
      syncPctFromRadio(rowId, s);
      checkWeroLogic(parent);
    };
    const lbl = document.createElement('label');
    lbl.htmlFor = rid;
    lbl.textContent = s;
    wrap.appendChild(inp);
    wrap.appendChild(lbl);
  });

  // Show/hide percent row
  if (pctRow) {
    pctRow.style.display = isPossHetGene ? 'flex' : 'none';
    syncPctFromRadio(rowId, defaultState);
  }

  parentGenes[parent][id] = { gene: geneName, state: defaultState };
}

// ─── WERO LOGIC ───────────────────────────────────────────────────────────────
function checkWeroLogic(parent) {
  const genes = parentGenes[parent];
  const geneNames = Object.values(genes).map(g => g.gene);
  const witblits = Object.values(genes).find(g => g.gene === 'Witblits' && g.state === 'Visual');
  const zero = Object.values(genes).find(g => g.gene === 'Zero' && g.state === 'Visual');

  const notice = document.getElementById(`${parent}-auto-notice`);
  if (witblits && zero) {
    notice.textContent = '⚡ Wero detected — this animal is Visual Witblits + Visual Zero.';
    notice.classList.add('visible');
  } else {
    notice.classList.remove('visible');
  }
}

// ─── GRANDPARENT AUTO-LOGIC ───────────────────────────────────────────────────
// (This sets hint text only — full grandparent gene calculation is complex; 
//  this implementation uses manual parent state input as primary source)

// ─── PEDIGREE PROBABILITY MAPPING ────────────────────────────────────────────
function stateToProb(state, proven) {
  // Returns { visual: p, het: p, normal: p } for recessive
  if (proven) {
    if (state.includes('Poss') || state === '66% Poss Het' || state === '50% Poss Het') {
      return { visual: 0, het: 1, normal: 0 };
    }
  }
  switch(state) {
    case 'Visual': return { visual: 1, het: 0, normal: 0 };
    case 'Het': return { visual: 0, het: 1, normal: 0 };
    case '66% Poss Het': return { visual: 0, het: 0.66, normal: 0.34 };
    case '50% Poss Het': return { visual: 0, het: 0.5, normal: 0.5 };
    case 'Normal': return { visual: 0, het: 0, normal: 1 };
    case 'Unknown': return { visual: 0, het: 0, normal: 1 }; // treat as normal with warning
    default: return { visual: 0, het: 0, normal: 1 };
  }
}

// ─── RECESSIVE CROSS ──────────────────────────────────────────────────────────
function crossRecessive(sireProb, damProb) {
  // sireProb/damProb: allele distributions
  // Each parent contributes 2 alleles: v, h, n
  // Combine via Punnett
  // For "Het" parent: 50% V allele, 50% n allele
  // For "Visual" parent: 100% V alleles

  const sireAlleles = getRecAlleles(sireProb);
  const damAlleles  = getRecAlleles(damProb);

  let results = {};
  for (const [sa, sp] of sireAlleles) {
    for (const [da, dp] of damAlleles) {
      const combo = getRecCombo(sa, da);
      results[combo] = (results[combo] || 0) + sp * dp;
    }
  }
  return results;
}

function getRecAlleles(prob) {
  // Returns array of [alleleType, probability] pairs
  // visual parent = [V,V]; het = [V,n 50/50]; normal = [n,n]; poss hets are probabilities
  let alleles = [];
  if (prob.visual === 1) { alleles.push(['V', 0.5], ['V', 0.5]); }
  else if (prob.het === 1) { alleles.push(['V', 0.5], ['n', 0.5]); }
  else if (prob.het > 0) {
    // Possible het: probability het, probability normal
    const hetChance = prob.het;
    const normChance = 1 - hetChance;
    alleles.push(['V', hetChance * 0.5], ['n', hetChance * 0.5 + normChance]);
  } else {
    alleles.push(['n', 0.5], ['n', 0.5]);
  }
  return alleles;
}

function getRecCombo(a1, a2) {
  if (a1 === 'V' && a2 === 'V') return 'visual';
  if ((a1 === 'V' && a2 === 'n') || (a1 === 'n' && a2 === 'V')) return 'het';
  return 'normal';
}

// ─── INCDOMINANT CROSS ────────────────────────────────────────────────────────
function crossIncDominant(sireState, damState) {
  // States: Normal, Visual (Leatherback), Super (Silkback)
  // Alleles: lb = leatherback allele, n = normal
  // Normal = nn, Visual = lb/n, Super = lb/lb

  const sireAlleles = getLBAlleles(sireState);
  const damAlleles  = getLBAlleles(damState);

  let results = {};
  for (const [sa, sp] of sireAlleles) {
    for (const [da, dp] of damAlleles) {
      const combo = getLBCombo(sa, da);
      results[combo] = (results[combo] || 0) + sp * dp;
    }
  }
  return results;
}

function getLBAlleles(state) {
  if (state === 'Visual (Leatherback)') return [['lb', 0.5], ['n', 0.5]];
  if (state === 'Super (Silkback)') return [['lb', 0.5], ['lb', 0.5]];
  return [['n', 0.5], ['n', 0.5]];
}

function getLBCombo(a1, a2) {
  if (a1 === 'lb' && a2 === 'lb') return 'super';
  if ((a1 === 'lb' && a2 === 'n') || (a1 === 'n' && a2 === 'lb')) return 'visual';
  return 'normal';
}

// ─── DOMINANT CROSS ───────────────────────────────────────────────────────────
function crossDominant(sireState, damState) {
  // Dunner: Visual = has allele, Normal = doesn't. No super.
  const sP = sireState === 'Visual' ? 0.5 : 0;
  const dP = damState === 'Visual' ? 0.5 : 0;
  // Each parent passes allele with 50% chance if Visual
  // Offspring: if either parent passes it -> visual (dominant)
  const pVisual = sP + dP - sP * dP * 2;
  // Simpler: Visual x Normal = 50% Visual, 50% Normal
  // Visual x Visual = 75% Visual, 25% Normal (simplified dominant)
  if (sireState === 'Visual' && damState === 'Visual') {
    return { visual: 0.75, normal: 0.25 };
  } else if (sireState === 'Visual' || damState === 'Visual') {
    return { visual: 0.5, normal: 0.5 };
  }
  return { visual: 0, normal: 1 };
}

// ─── COMBINE MULTI-GENE RESULTS ───────────────────────────────────────────────
function combineGeneResults(allGeneResults) {
  // allGeneResults: array of { geneName, outcomes: { stateName: probability } }
  // We need to enumerate all combinations

  let combined = [{}]; // array of { geneName: state } objects, each with a probability
  let combinedProbs = [1.0];

  for (const { geneName, outcomes } of allGeneResults) {
    const newCombined = [];
    const newProbs = [];
    for (let i = 0; i < combined.length; i++) {
      for (const [state, prob] of Object.entries(outcomes)) {
        if (prob <= 0) continue;
        const newEntry = { ...combined[i], [geneName]: state };
        newCombined.push(newEntry);
        newProbs.push(combinedProbs[i] * prob);
      }
    }
    combined = newCombined;
    combinedProbs = newProbs;
  }

  return combined.map((combo, i) => ({ combo, prob: combinedProbs[i] }));
}

// ─── FORMAT RESULT ROW ────────────────────────────────────────────────────────
function formatPhenotype(combo) {
  const visuals = [], hets = [], possHets = [], supers = [];
  const genotypeparts = [];

  for (const [gene, state] of Object.entries(combo)) {
    const g = GENES[gene];
    if (!g) continue;

    if (g.category === 'recessive') {
      if (state === 'visual') { visuals.push(gene); genotypeparts.push(`hom ${g.short}`); }
      else if (state === 'het') { hets.push(gene); genotypeparts.push(`het ${g.short}`); }
      else if (state === 'poss') { possHets.push(gene); genotypeparts.push(`66% poss het ${g.short}`); }
      else { genotypeparts.push(`nrm ${g.short}`); }
    } else if (g.category === 'incdominant') {
      if (state === 'super') { supers.push(gene); genotypeparts.push(`${g.short}/Silkback`); }
      else if (state === 'visual') { visuals.push(`Leatherback`); genotypeparts.push(`het ${g.short}`); }
      else { genotypeparts.push(`nrm ${g.short}`); }
    } else if (g.category === 'dominant') {
      if (state === 'visual') { visuals.push(gene); genotypeparts.push(`${g.short} dominant`); }
      else { genotypeparts.push(`nrm ${g.short}`); }
    } else if (g.category === 'nonmendelian') {
      if (state !== 'None') { visuals.push(`${state} ${gene}`); genotypeparts.push(state); }
    } else if (g.category === 'lineage') {
      if (state === 'visual') { visuals.push(gene); genotypeparts.push(`${g.short} lineage`); }
    }
  }

  let phenotype = '';
  const parts = [];
  if (supers.length) parts.push(...supers.map(s => `Super ${s}`));
  if (visuals.length) parts.push(...visuals);
  if (hets.length) parts.push(...hets.map(h => `Het ${h}`));
  if (possHets.length) parts.push(...possHets.map(h => `66% Poss Het ${h}`));
  if (!parts.length) parts.push('Normal / Wildtype');
  phenotype = parts.join(', ');

  return {
    phenotype,
    genotype: genotypeparts.join(' / ') || 'nrm',
    hasSuper: supers.length > 0,
    hasVisual: visuals.length > 0,
    hasHet: hets.length > 0
  };
}

// ─── MAIN CALCULATE ───────────────────────────────────────────────────────────
function calculate() {
  const warnings = [];
  const infos = [];
  const allGeneResults = [];

  // Collect all unique gene names across both parents
  const sireGenes = Object.values(parentGenes.sire);
  const damGenes = Object.values(parentGenes.dam);
  const allGeneNames = [...new Set([
    ...sireGenes.map(g => g.gene),
    ...damGenes.map(g => g.gene)
  ])];

  if (allGeneNames.length === 0) {
    alert('Please add at least one gene to calculate.');
    return;
  }

  // Check for Unknown states
  [...sireGenes, ...damGenes].forEach(g => {
    if (g.state === 'Unknown') {
      warnings.push(`⚠ ${g.gene}: one parent has Unknown state — treated as Normal. Genetic potential may be hidden.`);
    }
  });

  // Check silkback conflict
  const sireHasLB = sireGenes.find(g => g.gene === 'Leatherback');
  const damHasLB = damGenes.find(g => g.gene === 'Leatherback');
  if (sireHasLB?.state === 'Super (Silkback)' || damHasLB?.state === 'Super (Silkback)') {
    infos.push('ℹ Silkback parent detected. Note: Silkback × Silkback breeding is generally discouraged due to health concerns in offspring.');
  }

  // Wero
  const sireWitblits = sireGenes.find(g => g.gene === 'Witblits' && g.state === 'Visual');
  const sireZero = sireGenes.find(g => g.gene === 'Zero' && g.state === 'Visual');
  const damWitblits = damGenes.find(g => g.gene === 'Witblits' && g.state === 'Visual');
  const damZero = damGenes.find(g => g.gene === 'Zero' && g.state === 'Visual');
  if ((sireWitblits && sireZero) || (damWitblits && damZero)) {
    infos.push('ℹ Wero parent present (Visual Witblits + Visual Zero). Wero offspring will appear in results.');
  }

  for (const geneName of allGeneNames) {
    const gene = GENES[geneName];
    const sireEntry = sireGenes.find(g => g.gene === geneName);
    const damEntry = damGenes.find(g => g.gene === geneName);

    const sireState = sireEntry?.state || (gene.category === 'incdominant' ? 'Normal' : 'Normal');
    const damState = damEntry?.state || (gene.category === 'incdominant' ? 'Normal' : 'Normal');

    // Get proven status
    const sireProven = document.getElementById(`sire-gene-${Object.keys(parentGenes.sire).find(k => parentGenes.sire[k].gene === geneName)}-proven`)?.checked || false;
    const damProven = document.getElementById(`dam-gene-${Object.keys(parentGenes.dam).find(k => parentGenes.dam[k].gene === geneName)}-proven`)?.checked || false;

    let outcomes = {};

    if (gene.category === 'recessive') {
      const sP = stateToProb(sireState, sireProven);
      const dP = stateToProb(damState, damProven);
      outcomes = crossRecessive(sP, dP);
      // Merge poss hets into het for cleaner output but track 66% label
      if (outcomes.het) {
        // Check if both parents are hets -> label visuals as 66% poss het in genotype
        if (sP.het === 1 && dP.het === 1) {
          if (outcomes.visual) outcomes['66poss'] = outcomes.visual;
          delete outcomes.visual;
          if (outcomes['66poss']) {
            outcomes = { '66poss': outcomes['66poss'], het: outcomes.het, normal: outcomes.normal };
          }
        }
      }
    } else if (gene.category === 'incdominant') {
      outcomes = crossIncDominant(sireState, damState);
    } else if (gene.category === 'dominant') {
      const r = crossDominant(sireState, damState);
      outcomes = r;
    } else if (gene.category === 'nonmendelian') {
      // Simple color blending
      if (sireState === 'High Expression' && damState === 'High Expression') outcomes = { 'High Expression': 1 };
      else if (sireState === 'None' && damState === 'None') outcomes = { 'None': 1 };
      else if (sireState === 'High Expression' || damState === 'High Expression') outcomes = { 'High Expression': 0.5, 'Low Expression': 0.5 };
      else outcomes = { 'Low Expression': 0.5, 'None': 0.5 };
    } else if (gene.category === 'lineage') {
      if (sireState === 'Visual' || damState === 'Visual') outcomes = { visual: 0.5, normal: 0.5 };
      else outcomes = { normal: 1 };
    }

    // Normalise
    const total = Object.values(outcomes).reduce((a, b) => a + b, 0);
    if (total > 0) {
      for (const k in outcomes) outcomes[k] = outcomes[k] / total;
    }

    allGeneResults.push({ geneName, outcomes });
  }

  // Combine all gene results
  const combined = combineGeneResults(allGeneResults);

  // Merge duplicate phenotypes
  const merged = {};
  for (const { combo, prob } of combined) {
    const fmt = formatPhenotype(combo);
    const key = fmt.phenotype;
    if (merged[key]) {
      merged[key].prob += prob;
    } else {
      merged[key] = { ...fmt, prob };
    }
  }

  // Sort by probability descending
  const sorted = Object.values(merged).sort((a, b) => b.prob - a.prob);

  // Render
  renderResults(sorted, warnings, infos);
}

function renderResults(results, warnings, infos) {
  const section = document.getElementById('results-section');
  const body = document.getElementById('results-body');
  const warnContainer = document.getElementById('warnings-container');
  const infoContainer = document.getElementById('info-container');
  const meta = document.getElementById('results-meta');

  warnContainer.innerHTML = '';
  infoContainer.innerHTML = '';

  warnings.forEach(w => {
    const box = document.createElement('div');
    box.className = 'warning-box';
    box.innerHTML = `<span class="warning-icon">⚠</span><span>${w}</span>`;
    warnContainer.appendChild(box);
  });

  infos.forEach(info => {
    const box = document.createElement('div');
    box.className = 'info-box';
    box.textContent = info;
    infoContainer.appendChild(box);
  });

  const sireName = document.getElementById('sire-name').value || 'Sire';
  const damName = document.getElementById('dam-name').value || 'Dam';
  meta.textContent = `${sireName} × ${damName} — ${results.length} phenotype combination${results.length !== 1 ? 's' : ''}`;

  body.innerHTML = '';

  results.forEach(r => {
    const pct = (r.prob * 100).toFixed(1);
    const tr = document.createElement('tr');

    // Phenotype
    const tdPheno = document.createElement('td');
    let tagHtml = '';
    if (r.hasSuper) tagHtml += `<span class="tag tag-super">Super</span> `;
    if (r.hasVisual && !r.hasSuper) tagHtml += `<span class="tag tag-visual">Visual</span> `;
    if (r.hasHet) tagHtml += `<span class="tag tag-het">Het</span> `;
    tdPheno.innerHTML = `<div class="phenotype-name">${tagHtml}${r.phenotype}</div>`;
    tr.appendChild(tdPheno);

    // Genotype
    const tdGeno = document.createElement('td');
    tdGeno.innerHTML = `<div class="genotype-code">${r.genotype}</div>`;
    tr.appendChild(tdGeno);

    // Probability bar
    const tdProb = document.createElement('td');
    tdProb.className = 'prob-bar-cell';
    tdProb.innerHTML = `
      <div class="prob-bar-wrap">
        <div class="prob-bar"><div class="prob-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="prob-pct">${pct}%</div>
      </div>`;
    tr.appendChild(tdProb);

    body.appendChild(tr);
  });

  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
